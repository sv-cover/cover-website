twig:
    file_name_pattern: '*.twig'
    paths:
        'templates/_layout': 'layout'
    globals:
        auth: '@App\Legacy\Authentication\Authentication'
        humanize: '@App\Utils\HumanizeUtils'
        menu: '@App\Menu'
        policy: '@App\Legacy\Policy\Policy'
        photo_book_utils: '@App\Utils\PhotoBookUtils'
        search_utils: '@App\Utils\SearchUtils'
        sign_up_utils: '@App\SignUp\SignUpFormManager'
        config:
            filemanager_url: '%app.filemanager_root%'
    form_themes:
        - '@layout/form/bulma_layout.html.twig'
        - '@layout/form/custom_types.html.twig'

when@test:
    twig:
        strict_variables: true