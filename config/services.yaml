# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    db.showQueries: '%env(bool:DB_SHOW_QUERIES)%'
    env(DB_SHOW_QUERIES): false
    app.cache_dir:  '%env(default:kernel.cache_dir:APP_CACHE_DIR)%'
    app.committee_interest_log: '%env(default::APP_COMMITTEE_INTEREST_LOG)%'
    app.email_board: board@svcover.nl
    app.external_webcal_url: '%env(default::APP_EXTERNAL_WEBCAL_URL)%'
    app.filemanager_image_extensions:
        - jpeg
        - jpg
        - png
        - svg
        - webp
    app.filemanager_root: 'https://filemanager.svcover.nl'
    app.no_iban_string: OUTSIDE_SEPA_AREA
    app.photos_dir: '%env(APP_PHOTOS_DIR)%'
    app.photos_scaled_dir: '%env(APP_PHOTOS_SCALED_DIR)%'
    app.photos_scaled_url: '%env(default::APP_PHOTOS_SCALED_URL)%'
    app.timezone: '%env(APP_TIMEZONE)%'
    env(APP_TIMEZONE): Europe/Amsterdam

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    _instanceof:
        # services whose classes are instances of CustomInterface will be tagged automatically
        App\Legacy\Policy\PolicyInterface:
            tags: ['app.policy']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Legacy'
            - '../src/Model'

    App\Service\Authentication:
        public: true

    App\Service\Database:
        public: true
        arguments:
            $host: '%env(DB_HOST)%'
            $user: '%env(DB_USER)%'
            $password: '%env(DB_PASSWORD)%'
            $database: '%env(DB_DATABASE)%'
            $showQueries: '%db.showQueries%'

    App\Service\Incassomatic:
        arguments:
            $url: '%env(INCASSOMATIC_URL)%'
            $app: '%env(INCASSOMATIC_APP)%'
            $secret: '%env(INCASSOMATIC_SECRET)%'

    App\Service\Kast:
        arguments:
            $url: '%env(KAST_URL)%'
            $user: '%env(KAST_USER)%'
            $password: '%env(KAST_PASSWORD)%'

    App\Service\Policy:
        public: true

    App\Service\Secretary:
        public: true
        arguments:
            $url: '%env(SECRETARY_URL)%'
            $user: '%env(SECRETARY_USER)%'
            $password: '%env(SECRETARY_PASSWORD)%'

    App\SignUp\Fields\:
        resource: '../src/SignUp/Fields'
        shared: false

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
